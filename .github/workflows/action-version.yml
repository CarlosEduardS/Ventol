name: Atualizar versao no README

on:
  push:
    branches:
      - homologa

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions: 
      contents: write

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar mensagens de commit e calcular versao
        id: versioning
        run: |
          # Correção aqui: todo este bloco foi indentado para a direita
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Ultima versão encontrada: $LAST_TAG"

          VERSION=${LAST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          COMMIT_LOGS=$(git log $LAST_TAG..HEAD --oneline 2>/dev/null || git log --oneline)

          if echo "$COMMIT_LOGS" | grep -E "BREAKING CHANGE|feat!(\(.*\))?:|fix!(\(.*\))?:"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMIT_LOGS" | grep -E "feat(\(.*\))?:"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          elif echo "$COMMIT_LOGS" | grep -E "(fix|bug)(\(.*\))?:"; then # Correção aqui: adicionado 'then'
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v$MAJOR.$MINOR.$PATCH" # Correção aqui: ajustado de NEWTAG para NEW_TAG
          echo "Nova versão calculada: $NEW_TAG"

          echo "new_version=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "old_version=$LAST_TAG" >> $GITHUB_OUTPUT

      - name: Atualizar o arquivo README.md
        run: |
          OLD_VER="${{ steps.versioning.outputs.old_version }}"
          NEW_VER="${{ steps.versioning.outputs.new_version }}"

          if grep -q "$OLD_VER" README.md; then
            sed -i "s/$OLD_VER/$NEW_VER/g" README.md
          else
            echo -e "## Versão atual: $NEW_VER\n\n$(cat README.md)" > README.md
          fi

      - name: Commit e Push das alterações
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          if ! git diff --cached --quiet; then
            git commit -m "chore: atualiza versao no README para ${{ steps.versioning.outputs.new_version }} [skip ci]"
            git tag ${{ steps.versioning.outputs.new_version }}
            git push origin homologa --tags
          else
            echo "Nenhuma alteração na versão." # Correção aqui: fechamento das aspas
          fi
